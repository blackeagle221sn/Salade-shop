<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulation Paiement — Salade Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F5F5F0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 40px 36px; max-width: 440px; width: 100%; box-shadow: 0 12px 48px rgba(0,0,0,0.12); text-align: center; }
    .badge { display: inline-flex; align-items: center; gap: 10px; padding: 8px 20px; border-radius: 50px; margin-bottom: 28px; font-size: 14px; font-weight: 700; }
    .badge.wave { background: #EBF0FF; color: #0B59F5; }
    .badge.orange { background: #FFF0E8; color: #FF6B1A; }
    .logo { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: white; }
    .logo.wave { background: #0B59F5; }
    .logo.orange { background: #FF6B1A; }
    h1 { font-size: 22px; color: #1A1A1A; margin-bottom: 8px; font-weight: 700; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 28px; }
    .amount-box { background: #F5F5F0; border-radius: 12px; padding: 20px; margin-bottom: 28px; }
    .amount-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: #999; margin-bottom: 6px; }
    .amount-val { font-size: 2.2rem; font-weight: 700; color: #1A1A1A; }
    input { width: 100%; border: 2px solid #E5E5E0; border-radius: 10px; padding: 13px 16px; font-size: 16px; font-family: inherit; margin-bottom: 16px; text-align: center; }
    input:focus { outline: none; border-color: #4A7C2F; }
    input.error { border-color: red; }
    .info { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #92400E; margin-bottom: 24px; text-align: left; line-height: 1.6; }
    .btn { width: 100%; padding: 15px; border-radius: 50px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 12px; transition: all 0.2s; }
    .btn-wave { background: #0B59F5; color: white; }
    .btn-wave:hover { background: #0847CC; }
    .btn-orange { background: #FF6B1A; color: white; }
    .btn-orange:hover { background: #CC4A00; }
    .btn-cancel { background: #F5F5F0; color: #888; }
    .btn-cancel:hover { background: #E5E5E0; }
    .loading { display: none; flex-direction: column; align-items: center; gap: 16px; padding: 40px 0; }
    .loading.show { display: flex; }
    .spinner { width: 48px; height: 48px; border: 4px solid #E5E5E0; border-top-color: #4A7C2F; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sandbox-tag { font-size: 12px; color: #bbb; margin-top: 16px; }
  </style>
</head>
<body>
<div id="mainCard" class="card">
  <div id="badge"></div>
  <h1>🧪 Simulation de Paiement</h1>
  <p class="subtitle">Mode sandbox — Aucun argent réel débité</p>
  <div class="amount-box">
    <div class="amount-label">Montant à payer</div>
    <div class="amount-val" id="montant">—</div>
  </div>
  <input type="tel" id="phone" placeholder="Votre numéro (ex: 77 123 45 67)">
  <div class="info" id="info"></div>
  <button class="btn" id="btnPay" onclick="simuler()">Confirmer le paiement</button>
  <button class="btn btn-cancel" onclick="annuler()">Annuler</button>
  <p class="sandbox-tag">🔒 Connexion sécurisée — Test sandbox</p>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <p style="font-weight:600;">Traitement en cours...</p>
  <small style="color:#888;">Validation de la transaction</small>
</div>

<script>
  const params   = new URLSearchParams(window.location.search);
  const provider = params.get('provider') || 'wave';
  const orderId  = params.get('orderId');
  const amount   = parseInt(params.get('amount')) || 0;
  const isWave   = provider === 'wave';

  document.getElementById('badge').innerHTML = `
    <div class="badge ${isWave ? 'wave' : 'orange'}">
      <div class="logo ${isWave ? 'wave' : 'orange'}">${isWave ? 'W' : 'OM'}</div>
      ${isWave ? 'Wave' : 'Orange Money'} Sénégal
    </div>`;

  document.getElementById('montant').textContent =
    `${amount.toLocaleString('fr-FR')} FCFA`;

  document.getElementById('btnPay').className =
    `btn ${isWave ? 'btn-wave' : 'btn-orange'}`;

  document.getElementById('info').textContent = isWave
    ? '📱 Test Wave : entrez n\'importe quel numéro. En production, vous recevrez un SMS de confirmation.'
    : '📱 Test Orange Money : entrez n\'importe quel numéro. En production, une notification USSD sera envoyée.';

  async function simuler() {
    const phone = document.getElementById('phone').value.trim();
    if (!phone) {
      document.getElementById('phone').classList.add('error');
      return;
    }
    document.getElementById('mainCard').style.display = 'none';
    document.getElementById('loading').classList.add('show');

    await new Promise(r => setTimeout(r, 2500));

    try {
      const res  = await fetch(`/api/commandes/${orderId}/confirmer-sandbox`, { method: 'POST' });
      const data = await res.json();
      window.location.href = data.success
        ? `/paiement/succes?orderId=${orderId}`
        : `/paiement/echec?orderId=${orderId}`;
    } catch {
      window.location.href = `/paiement/succes?orderId=${orderId}`;
    }
  }

  function annuler() {
    window.location.href = `/paiement/annule?orderId=${orderId}`;
  }
</script>
</body>
</html>
